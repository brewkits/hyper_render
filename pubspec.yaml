name: hyper_render
description: "The Universal Content Engine for Flutter - A high-performance rendering engine for HTML, Markdown, and Quill Delta with perfect text selection, advanced CSS support, and CJK typography."
version: 2.0.0
homepage: https://github.com/brewkits/hyper_render
repository: https://github.com/brewkits/hyper_render
issue_tracker: https://github.com/brewkits/hyper_render/issues

# Topics for pub.dev discovery
topics:
  - html
  - rendering
  - richtext
  - quill
  - css

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # ============================================
  # MODULAR ARCHITECTURE v2.0
  # This package is a convenience wrapper that includes all plugins
  # For minimal dependencies, use individual packages:
  #   - hyper_render_core: Zero-dep core
  #   - hyper_render_html: HTML parsing
  #   - hyper_render_markdown: Markdown parsing
  #   - hyper_render_highlight: Syntax highlighting
  # ============================================

  # NOTE: For publishing to pub.dev, replace path dependencies with versions:
  #   hyper_render_core: ^2.0.0
  #   hyper_render_html: ^2.0.0
  #   hyper_render_markdown: ^2.0.0
  #   hyper_render_highlight: ^2.0.0
  # See PUBLISH.md for detailed publishing instructions.

  hyper_render_core:
    path: packages/hyper_render_core

  hyper_render_html:
    path: packages/hyper_render_html

  hyper_render_markdown:
    path: packages/hyper_render_markdown

  hyper_render_highlight:
    path: packages/hyper_render_highlight

  # hyper_render_clipboard: # Commented out due to share_plus/mime version conflict
  #   path: packages/hyper_render_clipboard

  flutter_highlight: any
  highlight: any
  csslib: any
  markdown: any
  html: any
  vector_math: any
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Mocking for tests
  mockito: ^5.4.4

  # Build runner for mockito code generation
  build_runner: ^2.4.8

flutter:
