name: hyper_render_html
description: "HTML parsing plugin for HyperRender. Provides full HTML parsing with CSS support."
version: 2.0.0
homepage: https://github.com/user/hyper_render
repository: https://github.com/user/hyper_render

topics:
  - html
  - parsing
  - css

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Core package (zero deps)
  hyper_render_core:
    path: ../hyper_render_core

  # HTML parsing - Dart team maintained
  html: ^0.15.6

  # CSS parsing - Dart team maintained
  csslib: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
