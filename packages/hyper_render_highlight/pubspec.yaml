name: hyper_render_highlight
description: "Syntax highlighting plugin for HyperRender. Provides code highlighting for 180+ languages."
version: 2.0.0
homepage: https://github.com/user/hyper_render
repository: https://github.com/user/hyper_render

# NOTE: This is a PAID plugin
# Contact: sales@hyperrender.dev

topics:
  - syntax-highlighting
  - code
  - highlight

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Core package (zero deps)
  hyper_render_core:
    path: ../hyper_render_core

  # Syntax highlighting
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
