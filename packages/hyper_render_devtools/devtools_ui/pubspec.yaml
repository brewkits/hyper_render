name: hyper_render_devtools_ui
description: "DevTools panel UI for HyperRender — tree inspector, style viewer, layout debug."
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  # DevTools extension SDK — connects the panel to the running app's VM service.
  devtools_extensions: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
