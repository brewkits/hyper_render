publish_to: none
name: hyper_render_devtools
description: "DevTools extension for HyperRender — inspect UDT trees, computed styles, fragments, and performance metrics."
version: 1.1.2
homepage: https://github.com/brewkits/hyper_render

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # HyperRender core for accessing UDT model types
  hyper_render_core:
    path: ../hyper_render_core

  # Note: devtools_extensions is only needed in the devtools_ui sub-package
  # (the Flutter Web panel). This library (service extensions) only uses
  # dart:developer + hyper_render_core and needs no extra dependency.

flutter:
  plugin:
    platforms:
      flutter:
        dartPluginClass: HyperRenderDevtoolsPlugin
