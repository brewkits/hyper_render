name: hyper_render_devtools
description: "DevTools extension for HyperRender — inspect UDT trees, computed styles, fragments, and performance metrics."
version: 1.2.0
homepage: https://github.com/brewkits/hyper_render
repository: https://github.com/brewkits/hyper_render/tree/main/packages/hyper_render_devtools
issue_tracker: https://github.com/brewkits/hyper_render/issues

topics:
  - flutter
  - devtools
  - debugging
  - inspector

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # HyperRender core for accessing UDT model types
  # Publishing: replace path with: hyper_render_core: ^1.2.0
  hyper_render_core:
    path: ../hyper_render_core

  # Note: devtools_extensions is only needed in the devtools_ui sub-package
  # (the Flutter Web panel). This library (service extensions) only uses
  # dart:developer + hyper_render_core and needs no extra dependency.

flutter:
  # No assets or native code — pure Dart/VM-service-extension package.
  # Platform support is inherited from the flutter SDK dependency (all 6 platforms).
