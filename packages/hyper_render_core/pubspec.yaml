version: 1.0.0
homepage: https://github.com/brewkits/hyper_render
repository: https://github.com/brewkits/hyper_render/tree/main/packages/hyper_render_core

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.10.0'

