name: hyper_render_math
description: >
  Community plugin template for HyperRender that renders mathematical
  expressions (LaTeX / MathML) via custom HTML tags. Use this as a
  starting point for your own math plugin.
version: 1.2.4
repository: https://github.com/brewkits/hyper_render

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  hyper_render_core:
    path: ../hyper_render_core
  # Uncomment one of the following rendering backends:
  #
  # KaTeX-based (fast, offline, recommended for most cases):
  #   flutter_math_fork: ^0.7.2
  #
  # WebView-based (full MathJax support, heavier):
  #   flutter_tex: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
