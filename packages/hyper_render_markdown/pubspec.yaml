publish_to: none
name: hyper_render_markdown
description: Markdown parser plugin for HyperRender - Converts Markdown to Universal Document Tree (UDT).
version: 1.1.2
homepage: https://github.com/brewkits/hyper_render
repository: https://github.com/brewkits/hyper_render/tree/main/packages/hyper_render_markdown

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.10.0'

topics:
  - flutter
  - markdown-renderer
  - markdown
  - commonmark

dependencies:
  flutter:
    sdk: flutter

  # Publishing: replace path with: hyper_render_core: ^1.1.2
  hyper_render_core:
    path: ../hyper_render_core

  markdown: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
